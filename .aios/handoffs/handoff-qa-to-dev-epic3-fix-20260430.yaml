  blockers: []

  next_action: >
    Aplicar fixes do docs/qa/QA_FIX_REQUEST.md.
    H1 e M1 são acoplados (mesmo trigger + refactor).
    Após validação verde, sinalizar @qa.
    Commit: "fix(qa): aplicar concerns H1/M1/M2 do gate Epic 3".
